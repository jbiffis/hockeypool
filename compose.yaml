services:
  backend:
    build: ./backend
    ports:
      - "8040:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_PORT=8080
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3040:80"
    depends_on:
      - backend
    restart: unless-stopped
